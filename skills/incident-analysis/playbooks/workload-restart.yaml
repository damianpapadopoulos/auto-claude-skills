id: workload-restart
title: Workload Restart
category: workload-failure
commandable: true
destructive_action: true
requires_pre_execution_evidence: true

required_tools:
  - kubectl

signals:
  supporting:
    - crash_loop_detected
    - liveness_probe_failures
  contradicting:
    - error_rate_spike_correlated_with_deploy
  veto_signals: []
  contradiction_penalty: 15

investigation_steps: |
  CrashLoopBackOff pre-mitigation triage. Complete this sequence BEFORE proposing
  a workload restart — each step may redirect to a different root-cause playbook.

  ## 1. Pod Status and Events
  - Describe the crashing pod: status, restart count, termination reason, recent events
  - Retrieve events for the pod sorted by timestamp — identify the failure sequence
  - If events show ImagePullBackOff, ErrImagePull, or CreateContainerConfigError:
    STOP — this is a pod-start failure, not a crashloop. Investigate config/image issues.

  ## 2. Termination Reason and Exit Code
  - Extract the container's last termination reason and exit code:
    - Exit code 1: application error — check previous container logs for stack trace
    - Exit code 137 (SIGKILL/OOMKilled): memory exhaustion — route to resource-overload
      or node-resource-exhaustion, not restart
    - Exit code 139 (SIGSEGV): segmentation fault — route to bad-release investigation
    - Exit code 143 (SIGTERM): graceful shutdown exceeded — check terminationGracePeriodSeconds
  - If OOMKilled: a restart will crash again. Investigate memory limits vs actual usage.

  ## 3. Previous Container Logs
  - Retrieve logs from the previous (crashed) container instance
  - Look for: stack traces, dependency connection failures, configuration errors,
    startup-time errors that indicate the application cannot initialize

  ## 4. Deployment and Probe Configuration
  - Check container image, resource limits, environment variables
  - Check liveness/readiness probe configuration: if initialDelaySeconds is too short
    for startup time, the probe is killing the container — fix probe config, not restart
  - Check if startup probe is configured (absorbs slow startup without liveness kills)

  ## 5. Rollout History Correlation
  - Check if the crashloop started after a recent deployment
  - Correlate crash onset timestamp with rollout history timestamps
  - If correlated: route to bad-release-rollback investigation

  ## 6. Restart Decision Gate
  - Only proceed with workload-restart if:
    a) Exit code is NOT 137 (OOMKilled) — restart will not help
    b) No recent deployment correlates with crash onset — otherwise rollback is better
    c) Probe configuration is appropriate — otherwise fix probes
    d) No dependency failure is identified — otherwise fix dependency
  - If all checks pass and cause is transient state corruption: restart is appropriate

queries:
  kubectl_get_deployment:
    kind: kubectl
    command_argv: ["kubectl", "get", "deployment/{{deployment_name}}", "-n", "{{namespace}}", "-o", "json"]
    extract: ".metadata.name"
  kubectl_rollout_status:
    kind: rollout_status
    resource_kind: deployment
    resource_name: "{{deployment_name}}"
    namespace: "{{namespace}}"
    watch: false
  kubectl_ready_replicas:
    kind: kubectl
    command_argv: ["kubectl", "get", "deployment/{{deployment_name}}", "-n", "{{namespace}}", "-o", "jsonpath={.status.readyReplicas}"]
    extract: "."
  error_rate_query:
    kind: log_metric
    description: "Error rate for the affected service in the observation window"
    metric: error_rate
    scope: affected_service

pre_conditions:
  - id: deployment_exists
    query_ref: kubectl_get_deployment
    operator: exists
    threshold: 1
    window_seconds: 0

post_conditions:
  - id: error_rate_baseline
    query_ref: error_rate_query
    operator: lte
    threshold_ref: pre_incident_baseline_p95
    window_seconds: 300
  - id: rollout_ready
    query_ref: kubectl_rollout_status
    operator: equals
    threshold: true
    window_seconds: 0

hard_stop_conditions:
  - id: zero_ready_replicas
    query_ref: kubectl_ready_replicas
    operator: equals
    threshold: 0
    window_seconds: 0
  - id: error_rate_worse
    query_ref: error_rate_query
    operator: gt
    threshold_ref: pre_mitigation_error_rate
    window_seconds: 0

stop_conditions:
  - id: error_rate_unchanged
    query_ref: error_rate_query
    operator: gte
    threshold_ref: pre_mitigation_error_rate
    window_seconds: 0

freshness_window_seconds: 300
stabilization_delay_seconds: 180
validation_window_seconds: 300
sample_interval_seconds: 30

state_fingerprint_fields:
  - "deployment.metadata.resourceVersion"
  - "deployment.metadata.generation"
  - "deployment.status.observedGeneration"
  - "deployment.spec.template.metadata.labels.pod-template-hash"

parameters:
  - name: namespace
    resolver:
      kind: prompt
    required: true
    validation:
      regex: "^[a-z0-9][a-z0-9-]{0,62}$"
  - name: deployment_name
    resolver:
      kind: kubectl
      resource_kind: deployment
      scope: namespace
      bind_to: affected_workload
      cardinality: exactly_one
    required: true
    validation:
      resource_kind: deployment

command:
  argv: ["kubectl", "rollout", "restart", "deployment/{{deployment_name}}", "-n", "{{namespace}}"]
  cas_mode: revalidate_only
  dry_run:
    argv: ["kubectl", "rollout", "restart", "deployment/{{deployment_name}}", "-n", "{{namespace}}", "--dry-run=server"]

explanation: >
  Pods are crash-looping or failing health checks. Restarting the deployment
  forces fresh pod creation which can resolve transient state corruption,
  stuck processes, or resource leaks.
