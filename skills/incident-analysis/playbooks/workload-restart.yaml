id: workload-restart
title: Workload Restart
category: workload-failure
commandable: true
destructive_action: true
requires_pre_execution_evidence: true

required_tools:
  - kubectl

signals:
  supporting:
    - crash_loop_detected
    - liveness_probe_failures
  contradicting:
    - error_rate_spike_correlated_with_deploy
  veto_signals: []
  contradiction_penalty: 15

queries:
  kubectl_get_deployment:
    kind: kubectl
    command_argv: ["kubectl", "get", "deployment/{{deployment_name}}", "-n", "{{namespace}}", "-o", "json"]
    extract: ".metadata.name"
  kubectl_rollout_status:
    kind: rollout_status
    resource_kind: deployment
    resource_name: "{{deployment_name}}"
    namespace: "{{namespace}}"
    watch: false
  kubectl_ready_replicas:
    kind: kubectl
    command_argv: ["kubectl", "get", "deployment/{{deployment_name}}", "-n", "{{namespace}}", "-o", "jsonpath={.status.readyReplicas}"]
    extract: "."
  error_rate_query:
    kind: log_metric
    description: "Error rate for the affected service in the observation window"
    metric: error_rate
    scope: affected_service

pre_conditions:
  - id: deployment_exists
    query_ref: kubectl_get_deployment
    operator: exists
    threshold: 1
    window_seconds: 0

post_conditions:
  - id: error_rate_baseline
    query_ref: error_rate_query
    operator: lte
    threshold_ref: pre_incident_baseline_p95
    window_seconds: 300
  - id: rollout_ready
    query_ref: kubectl_rollout_status
    operator: equals
    threshold: true
    window_seconds: 0

hard_stop_conditions:
  - id: zero_ready_replicas
    query_ref: kubectl_ready_replicas
    operator: equals
    threshold: 0
    window_seconds: 0
  - id: error_rate_worse
    query_ref: error_rate_query
    operator: gt
    threshold_ref: pre_mitigation_error_rate
    window_seconds: 0

stop_conditions:
  - id: error_rate_unchanged
    query_ref: error_rate_query
    operator: gte
    threshold_ref: pre_mitigation_error_rate
    window_seconds: 0

freshness_window_seconds: 300
stabilization_delay_seconds: 180
validation_window_seconds: 300
sample_interval_seconds: 30

state_fingerprint_fields:
  - "deployment.metadata.resourceVersion"
  - "deployment.metadata.generation"
  - "deployment.status.observedGeneration"
  - "deployment.spec.template.metadata.labels.pod-template-hash"

parameters:
  - name: namespace
    resolver:
      kind: prompt
    required: true
    validation:
      regex: "^[a-z0-9][a-z0-9-]{0,62}$"
  - name: deployment_name
    resolver:
      kind: kubectl
      resource_kind: deployment
      scope: namespace
      bind_to: affected_workload
      cardinality: exactly_one
    required: true
    validation:
      resource_kind: deployment

command:
  argv: ["kubectl", "rollout", "restart", "deployment/{{deployment_name}}", "-n", "{{namespace}}"]
  cas_mode: revalidate_only
  dry_run:
    argv: ["kubectl", "rollout", "restart", "deployment/{{deployment_name}}", "-n", "{{namespace}}", "--dry-run=server"]

explanation: >
  Pods are crash-looping or failing health checks. Restarting the deployment
  forces fresh pod creation which can resolve transient state corruption,
  stuck processes, or resource leaks.
