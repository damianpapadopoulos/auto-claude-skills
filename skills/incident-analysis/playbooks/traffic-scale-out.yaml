id: traffic-scale-out
title: Traffic Scale Out
category: resource-overload
commandable: true
destructive_action: false
requires_pre_execution_evidence: false

required_tools:
  - kubectl

signals:
  supporting:
    - cpu_saturation_detected
    - memory_pressure_detected
    - traffic_spike_detected
  contradicting:
    - crash_loop_coexists_with_saturation
  veto_signals: []
  contradiction_penalty: 30

queries:
  kubectl_get_deployment:
    kind: kubectl
    command_argv: ["kubectl", "get", "deployment/{{deployment_name}}", "-n", "{{namespace}}", "-o", "json"]
    extract: ".metadata.name"
  kubectl_ready_replicas:
    kind: kubectl
    command_argv: ["kubectl", "get", "deployment/{{deployment_name}}", "-n", "{{namespace}}", "-o", "jsonpath={.status.readyReplicas}"]
    extract: "."
  error_rate_query:
    kind: log_metric
    description: "Error rate for the affected service in the observation window"
    metric: error_rate
    scope: affected_service

pre_conditions:
  - id: deployment_exists
    query_ref: kubectl_get_deployment
    operator: exists
    threshold: 1
    window_seconds: 0
  - id: current_replicas_nonzero
    query_ref: kubectl_ready_replicas
    operator: gt
    threshold: 0
    window_seconds: 0

post_conditions:
  - id: error_rate_drops
    query_ref: error_rate_query
    operator: lte
    threshold_ref: pre_incident_baseline_p95
    window_seconds: 300
  - id: ready_replicas_at_target
    query_ref: kubectl_ready_replicas
    operator: equals
    threshold_ref: target_replicas
    window_seconds: 0

hard_stop_conditions:
  - id: zero_ready_replicas
    query_ref: kubectl_ready_replicas
    operator: equals
    threshold: 0
    window_seconds: 0
  - id: error_rate_worse
    query_ref: error_rate_query
    operator: gt
    threshold_ref: pre_mitigation_error_rate
    window_seconds: 0

stop_conditions:
  - id: error_rate_unchanged
    query_ref: error_rate_query
    operator: gte
    threshold_ref: pre_mitigation_error_rate
    window_seconds: 0

freshness_window_seconds: 300
stabilization_delay_seconds: 90
validation_window_seconds: 300
sample_interval_seconds: 30

state_fingerprint_fields:
  - "deployment.metadata.resourceVersion"
  - "deployment.metadata.generation"
  - "deployment.status.observedGeneration"
  - "deployment.spec.template.metadata.labels.pod-template-hash"

parameters:
  - name: namespace
    resolver:
      kind: prompt
    required: true
    validation:
      regex: "^[a-z0-9][a-z0-9-]{0,62}$"
  - name: deployment_name
    resolver:
      kind: kubectl
      resource_kind: deployment
      scope: namespace
      bind_to: affected_workload
      cardinality: exactly_one
    required: true
    validation:
      resource_kind: deployment
  - name: current_replicas
    resolver:
      kind: kubectl
      resource_kind: deployment
      field: ".spec.replicas"
      scope: namespace
    required: true
    validation:
      regex: "^[0-9]+$"
  - name: target_replicas
    resolver:
      kind: computed
      expression: "current_replicas + 3"
    required: true
    validation:
      regex: "^[0-9]+$"

command:
  argv: ["kubectl", "scale", "deployment/{{deployment_name}}", "-n", "{{namespace}}", "--replicas={{target_replicas}}"]
  cas_mode: revalidate_only

explanation: >
  Resource utilization exceeds safe thresholds. Scaling out adds capacity to
  absorb the load while the team investigates the underlying cause.
